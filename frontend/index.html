<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato AI Recommendations</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo">zomato <span style="font-size: 16px; color: #5b403f; font-weight: 600;">AI</span></div>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h1>Discover the best food with AI</h1>
            <p>Tell us what you're craving, and our AI will find the perfect matches for you.</p>
        </section>

        <div class="main-layout">
            <!-- Preference Form Section -->
            <aside>
                <form id="preference-form" class="preference-form">
                    <div class="form-group">
                        <label class="form-label" for="location">Location</label>
                        <!-- Updated to dropdown per user request -->
                        <select id="location" name="location" class="form-select" required>
                            <option value="">Loading locations...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="budget">Budget for Two</label>
                        <select id="budget" name="budget" class="form-select" required>
                            <option value="medium">Medium (₹300 - ₹800)</option>
                            <option value="low">Low (≤ ₹300)</option>
                            <option value="high">High (≥ ₹800)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="cuisine">Cuisines</label>
                        <select id="cuisine" name="cuisine" class="form-select">
                            <option value="">Any Cuisine...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="min-rating">Minimum Rating</label>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <input type="range" id="min-rating" name="min_rating" min="3.0" max="5.0" step="0.1" value="4.0" style="flex: 1;">
                            <span id="rating-val" style="font-weight: 600;">4.0+</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="preferences">Additional Preferences</label>
                        <textarea id="preferences" name="preferences" class="form-input" rows="2" placeholder="e.g. rooftop, family friendly, live music"></textarea>
                    </div>

                    <button type="submit" id="submit-btn" class="btn-primary">Ask AI</button>
                </form>
            </aside>

            <!-- Results Section -->
            <section class="results-area">
                <!-- Initial State -->
                <div id="initial-state" style="text-align: center; padding: 60px 20px; color: #a0a0a0;">
                    <h2>Ready to explore?</h2>
                    <p>Select your preferences on the left and ask the AI.</p>
                </div>

                <!-- Loading State -->
                <div id="loading-state" class="loader-container hidden">
                    <div class="spinner"></div>
                    <div class="loader-text">AI is tasting the data...</div>
                </div>

                <!-- Results State -->
                <div id="results-state" class="hidden">
                    <div class="ai-summary">
                        <div class="sparkle-icon">✨</div>
                        <div id="ai-summary-text" class="ai-summary-text"></div>
                    </div>
                    
                    <div id="cards-container" class="cards-grid">
                        <!-- Cards injected via JS -->
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/components/RecommendationCard.js"></script>
    <script src="js/components/PreferenceForm.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
